name: Flutter Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.7"

      - name: Install Dependencies
        run: flutter pub get

      - name: Find Isar
        run: |
          find ~/.pub-cache -name build.gradle | grep isar_flutter_libs

      - name: Patch Isar Namespace
        run: |
          FILE=$(find ~/.pub-cache -name build.gradle | grep isar_flutter_libs)

          echo "PATCH FILE = $FILE"

          if [ -z "$FILE" ]; then
            echo "Isar build.gradle tidak ditemukan!"
            exit 1
          fi

          grep namespace "$FILE" || sed -i '/android {/a\    namespace "dev.isar.isar_flutter_libs"' "$FILE"

          echo "========== HASIL PATCH =========="
          cat "$FILE"

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DigiNews-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk